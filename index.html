<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>母亲节快乐 ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;min-height:100dvh;
  background:#1a0a1e;
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  position:relative
}
/* 背景层 */
.bg-layer{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse at 20% 30%,#4a1530 0%,transparent 50%),
             radial-gradient(ellipse at 80% 20%,#2d1a3a 0%,transparent 50%),
             radial-gradient(ellipse at 50% 80%,#3a1540 0%,transparent 50%),
             linear-gradient(180deg,#1a0a1e 0%,#2d1535 50%,#1a0a1e 100%);
  animation:bgBreath 8s ease-in-out infinite
}
@keyframes bgBreath{
  0%,100%{opacity:1}
  50%{opacity:0.85}
}
/* 光晕 */
.glow{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  filter:blur(60px);opacity:0;
  animation:glowPulse 5s ease-in-out infinite
}
.g1{width:300px;height:300px;background:#e91e63;top:5%;left:10%;animation-delay:0s}
.g2{width:250px;height:250px;background:#9c27b0;top:55%;right:5%;animation-delay:1.5s}
.g3{width:200px;height:200px;background:#ff4081;bottom:5%;left:40%;animation-delay:3s}
@keyframes glowPulse{
  0%,100%{opacity:0;transform:scale(0.8)}
  50%{opacity:0.4;transform:scale(1.2)}
}
/* 萤火虫 */
.firefly{
  position:fixed;width:3px;height:3px;background:#ffd54f;border-radius:50%;
  pointer-events:none;z-index:0;
  box-shadow:0 0 6px 2px rgba(255,213,79,0.6);
  animation:fly linear infinite;opacity:0
}
@keyframes fly{
  0%{transform:translate(0,0) scale(0);opacity:0}
  8%{opacity:0.9;transform:translate(20px,-15px) scale(1)}
  92%{opacity:0.6}
  100%{transform:translate(var(--dx),var(--dy)) scale(0.3);opacity:0}
}
/* 容器 */
.container{
  text-align:center;padding:16px;position:relative;z-index:2;
  width:100%;max-width:440px
}
/* 卡片 */
.card{
  background:linear-gradient(145deg,rgba(50,20,40,0.85),rgba(35,15,35,0.9));
  backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-radius:28px;padding:32px 20px 28px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.06),inset 0 1px 0 rgba(255,255,255,0.05);
  position:relative;overflow:hidden
}
.card::before{
  content:'';position:absolute;inset:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;opacity:0.3
}
.card::after{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle at 35% 30%,rgba(233,30,99,0.04) 0%,transparent 50%),
             radial-gradient(circle at 65% 70%,rgba(156,39,176,0.03) 0%,transparent 50%);
  animation:cardShimmer 10s ease-in-out infinite
}
@keyframes cardShimmer{
  0%,100%{transform:translate(0,0)}
  50%{transform:translate(4%,4%)}
}
/* 四角装饰 */
.corner{position:absolute;width:36px;height:36px;opacity:0.2}
.corner::before,.corner::after{
  content:'';position:absolute;background:linear-gradient(135deg,#e91e63,transparent)
}
.corner-tl{top:12px;left:12px;transform:rotate(0deg)}
.corner-tl::before{width:20px;height:1px;top:0;left:0}
.corner-tl::after{width:1px;height:20px;top:0;left:0}
.corner-tr{top:12px;right:12px;transform:rotate(90deg)}
.corner-tr::before{width:20px;height:1px;top:0;left:0}
.corner-tr::after{width:1px;height:20px;top:0;left:0}
.corner-bl{bottom:12px;left:12px;transform:rotate(-90deg)}
.corner-bl::before{width:20px;height:1px;top:0;left:0}
.corner-bl::after{width:1px;height:20px;top:0;left:0}
.corner-br{bottom:12px;right:12px;transform:rotate(180deg)}
.corner-br::before{width:20px;height:1px;top:0;left:0}
.corner-br::after{width:1px;height:20px;top:0;left:0}
/* 顶部装饰 */
.top-ornament{
  text-align:center;margin-bottom:8px;letter-spacing:6px;
  font-size:16px;opacity:0.3;color:#e91e63;
  font-family:serif
}
/* 标题 */
.title{
  font-size:28px;font-weight:700;
  background:linear-gradient(135deg,#f8bbd0,#e91e63,#ff4081);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:4px;margin-bottom:2px
}
.subtitle{
  font-size:12px;color:rgba(233,30,99,0.4);letter-spacing:3px;
  margin-bottom:16px;text-transform:uppercase
}
/* 心形 */
.heart-icon{
  font-size:36px;display:block;margin-bottom:6px;
  animation:heartPulse 1.6s ease-in-out infinite;
  filter:drop-shadow(0 0 10px rgba(233,30,99,0.3))
}
@keyframes heartPulse{
  0%,100%{transform:scale(1)}
  15%{transform:scale(1.25)}
  30%{transform:scale(1)}
  45%{transform:scale(1.15)}
  60%{transform:scale(1)}
}
/* 照片 */
.photo-area{margin:12px 0;position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}
.photo-frame{
  width:104px;height:104px;border-radius:50%;margin:0 auto;
  background:linear-gradient(135deg,rgba(233,30,99,0.15),rgba(156,39,176,0.15));
  border:2px solid rgba(233,30,99,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:40px;overflow:hidden;
  box-shadow:0 4px 20px rgba(233,30,99,0.1),inset 0 0 20px rgba(233,30,99,0.05);
  transition:all 0.4s ease;position:relative
}
.photo-frame:active{transform:scale(0.95)}
.photo-frame img{width:100%;height:100%;object-fit:cover;display:block}
.photo-frame .mom-icon{font-size:42px;line-height:1;transition:opacity 0.3s}
.photo-ring{
  position:absolute;inset:-3px;border-radius:50%;
  border:2px solid transparent;
  background:linear-gradient(135deg,#e91e63,#9c27b0,#ff4081) border-box;
  -webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite:exclude;
  animation:ringSpin 3s linear infinite
}
@keyframes ringSpin{to{transform:rotate(360deg)}}
.photo-hint{
  position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
  font-size:10px;color:rgba(233,30,99,0.4);white-space:nowrap;
  letter-spacing:1px
}
/* 名字 */
.name-area{margin:6px 0 10px;display:flex;align-items:center;justify-content:center;gap:6px}
.name-label{font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:1px}
.name-display{
  font-size:15px;font-weight:600;color:#f8bbd0;
  border-bottom:1px dashed rgba(233,30,99,0.25);
  cursor:pointer;padding:0 4px;letter-spacing:1px;
  -webkit-tap-highlight-color:transparent
}
.name-edit{
  display:none;border:1px solid rgba(233,30,99,0.4);border-radius:10px;
  padding:3px 10px;font-size:14px;font-family:inherit;
  color:#f8bbd0;outline:none;width:90px;text-align:center;
  background:rgba(233,30,99,0.08)
}
.name-edit.show{display:inline-block}
/* 消息区 */
.message-area{
  position:relative;min-height:40px;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  margin:4px 0
}
.main-message{
  font-size:16px;line-height:1.8;color:rgba(255,255,255,0.5);
  letter-spacing:1px;transition:opacity 0.4s
}
.main-message.hidden{display:none}
/* 礼盒 */
.gift-box{
  position:relative;width:180px;height:120px;margin:8px auto;
  perspective:600px;display:none
}
.gift-box.show{display:block}
.gift-body{
  position:absolute;bottom:0;left:0;right:0;height:70px;
  background:linear-gradient(135deg,#c2185b,#e91e63);
  border-radius:8px;box-shadow:0 6px 24px rgba(233,30,99,0.3);
  display:flex;align-items:center;justify-content:center
}
.gift-ribbon-v{
  position:absolute;top:0;bottom:0;left:50%;width:8px;
  background:linear-gradient(180deg,#ffd54f,#ffb300);
  transform:translateX(-50%);border-radius:4px
}
.gift-ribbon-h{
  position:absolute;left:10%;right:10%;top:50%;height:8px;
  background:linear-gradient(90deg,#ffd54f,#ffb300);
  transform:translateY(-50%);border-radius:4px
}
.gift-bow{
  position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  font-size:28px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  z-index:3
}
/* 盒盖 */
.gift-lid{
  position:absolute;top:-30px;left:-4px;right:-4px;height:36px;
  background:linear-gradient(135deg,#d81b60,#e91e63);
  border-radius:6px 6px 0 0;box-shadow:0 -2px 12px rgba(0,0,0,0.2);
  transform-origin:bottom center;
  transition:transform 0.8s cubic-bezier(0.34,1.56,0.64,1);
  z-index:4
}
.gift-lid-ribbon{
  position:absolute;top:0;bottom:0;left:50%;width:6px;
  background:#ffb300;transform:translateX(-50%);border-radius:2px
}
.gift-box.opened .gift-lid{
  transform:rotateX(-120deg) translateY(-20px);
  opacity:0
}
.gift-box.opened .gift-bow{
  animation:bowFly 1s ease forwards
}
@keyframes bowFly{
  0%{transform:translateX(-50%) scale(1);opacity:1}
  100%{transform:translateX(-50%) translateY(-80px) scale(0.3);opacity:0}
}
/* 光芒爆发 */
.light-burst{
  position:absolute;top:50%;left:50%;width:0;height:0;
  pointer-events:none;display:none
}
.light-burst.show{display:block}
.light-ray{
  position:absolute;width:3px;height:40px;
  background:linear-gradient(180deg,#ffd54f,transparent);
  border-radius:2px;opacity:0;
  animation:rayBurst 0.6s ease forwards
}
@keyframes rayBurst{
  0%{transform:rotate(var(--r)) translateY(0);opacity:0}
  30%{opacity:1}
  100%{transform:rotate(var(--r)) translateY(60px);opacity:0}
}
/* 信件 */
.letter{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:140px;height:90px;
  background:linear-gradient(135deg,#fef7e0,#fdf5e6,#fef7e0);
  border-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,0.2),inset 0 0 20px rgba(0,0,0,0.03);
  transition:all 0.8s cubic-bezier(0.34,1.56,0.64,1);
  opacity:0;z-index:2;overflow:hidden;
  padding:12px 10px;text-align:center
}
.gift-box.opened .letter{
  opacity:1;transform:translate(-50%,-100%) scale(1.1)
}
.letter-fold{
  position:absolute;top:0;left:0;right:0;height:50%;
  background:linear-gradient(180deg,rgba(0,0,0,0.03),transparent);
  border-bottom:1px solid rgba(0,0,0,0.04)
}
.letter-heart{font-size:22px;position:relative;z-index:1;opacity:0.6}
.letter-line{
  width:60%;height:2px;background:rgba(0,0,0,0.06);
  margin:5px auto;border-radius:1px
}
/* 祝福语 */
.blessing-full{display:none;width:100%;padding:0 4px}
.blessing-full.show{display:block}
.blessing-text{font-size:16px;line-height:2;color:rgba(255,255,255,0.85);letter-spacing:1px}
.blessing-text p{opacity:0;animation:paraFadeIn 0.5s ease forwards}
@keyframes paraFadeIn{to{opacity:1}}
.blessing-text .hl{color:#f8bbd0;font-weight:600}
.blessing-text .hl2{color:#ff4081;font-weight:600}
.blessing-text .mn{color:#f8bbd0;font-weight:700}
.signature{margin-top:14px;font-size:14px;color:#e91e63;letter-spacing:2px;font-weight:600}
.typed-cursor{
  display:inline-block;width:2px;height:1em;
  background:#f8bbd0;margin-left:1px;
  animation:blink 0.7s step-end infinite;vertical-align:text-bottom
}
@keyframes blink{50%{opacity:0}}
/* 按钮 */
.tap-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#e91e63,#ad1457);
  color:#fff;border:none;padding:12px 32px;
  border-radius:50px;font-size:15px;font-weight:600;
  letter-spacing:2px;cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:0 6px 24px rgba(233,30,99,0.3);
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  margin-top:2px
}
.tap-btn:active{transform:scale(0.95)}
.tap-btn::after{
  content:'';position:absolute;top:50%;left:50%;
  width:0;height:0;background:rgba(255,255,255,0.15);
  border-radius:50%;transform:translate(-50%,-50%);
  transition:width 0.5s,height 0.5s
}
.tap-btn:active::after{width:250px;height:250px}
.card.opened .tap-btn{display:none}
/* 分享提示 */
.share-tip{
  display:none;margin-top:10px;padding:8px 14px;
  background:rgba(233,30,99,0.08);
  border-radius:12px;font-size:12px;color:rgba(255,255,255,0.5);
  letter-spacing:1px;
  animation:tipFade 0.6s ease forwards
}
.share-tip.show{display:block}
@keyframes tipFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* 底部信息 */
.info-row{
  display:flex;align-items:center;justify-content:center;gap:12px;
  margin-top:12px;font-size:12px;color:rgba(255,255,255,0.2);letter-spacing:1px
}
.info-row span{display:flex;align-items:center;gap:3px}
.footer{margin-top:14px;font-size:11px;color:rgba(255,255,255,0.12);letter-spacing:1px}
/* 花瓣 */
.petal{
  position:fixed;font-size:14px;pointer-events:none;z-index:1;
  animation:petalFall linear forwards;opacity:0
}
@keyframes petalFall{
  0%{transform:translateY(-30px) rotate(0deg) scale(0.5);opacity:0}
  10%{opacity:0.8}
  90%{opacity:0.3}
  100%{transform:translateY(100vh) rotate(var(--pr)) scale(1.1);opacity:0}
}
/* 纸屑 */
.confetti{
  position:fixed;width:6px;height:6px;pointer-events:none;z-index:20;
  animation:confettiBurst ease-out forwards
}
@keyframes confettiBurst{
  0%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1}
  100%{transform:translate(var(--cx),var(--cy)) rotate(var(--cr)) scale(0);opacity:0}
}
/* 涟漪 */
.ripple{
  position:fixed;border-radius:50%;
  background:rgba(233,30,99,0.08);
  transform:scale(0);animation:rippleAnim 0.6s ease-out forwards;
  pointer-events:none;z-index:10
}
@keyframes rippleAnim{to{transform:scale(4);opacity:0}}
/* 音乐按钮 */
.music-btn{
  position:fixed;top:14px;right:14px;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,0.06);backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  font-size:16px;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s ease;color:rgba(255,255,255,0.6);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation
}
.music-btn:active{transform:scale(0.9)}
.music-btn.playing{background:rgba(233,30,99,0.15);border-color:rgba(233,30,99,0.3);color:#f8bbd0}
.safe-area-bottom{height:env(safe-area-inset-bottom,0)}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="glow g1"></div>
<div class="glow g2"></div>
<div class="glow g3"></div>
<button class="music-btn" id="musicBtn">♫</button>
<div class="container">
  <div class="card" id="card">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="top-ornament">♡ ♡ ♡</div>
    <span class="heart-icon">💗</span>
    <div class="title">母亲节快乐</div>
    <div class="subtitle">Happy Mother's Day</div>
    <div class="photo-area" id="photoArea">
      <div class="photo-frame" id="photoFrame">
        <span class="mom-icon" id="momIcon">👩</span>
        <div class="photo-ring"></div>
        <input type="file" accept="image/*" id="photoInput" style="display:none">
      </div>
      <div class="photo-hint">点击更换照片</div>
    </div>
    <div class="name-area">
      <span class="name-label">致</span>
      <span class="name-display" id="nameDisplay">妈妈</span>
      <input class="name-edit" id="nameInput" type="text" value="妈妈" maxlength="10">
    </div>
    <div class="message-area">
      <div class="main-message" id="mainMsg">
        ✦ 点击下方打开礼物 ✦
      </div>
      <div class="gift-box" id="giftBox">
        <div class="gift-body">
          <div class="gift-ribbon-v"></div>
          <div class="gift-ribbon-h"></div>
          <div class="gift-bow">🎀</div>
          <div class="letter" id="letter">
            <div class="letter-fold"></div>
            <div class="letter-heart">💖</div>
            <div class="letter-line"></div>
            <div class="letter-line" style="width:40%"></div>
          </div>
        </div>
        <div class="gift-lid"><div class="gift-lid-ribbon"></div></div>
        <div class="light-burst" id="lightBurst"></div>
      </div>
      <div class="blessing-full" id="blessingFull">
        <div class="blessing-text" id="blessingText">
          <p>🌹 亲爱的 <span class="mn" id="bName">妈妈</span> 🌹</p>
          <br>
          <p>感谢您用 <span class="hl2">温柔</span> 为我撑起世界</p>
          <p>用 <span class="hl2">白发</span> 换来我的成长</p>
          <p>用 <span class="hl2">皱纹</span> 记录爱的时光</p>
          <br>
          <p>您的 <span class="hl">笑容</span> 是阳光</p>
          <p>您的 <span class="hl">怀抱</span> 是港湾</p>
          <p>您的 <span class="hl">健康</span> 是我最深的祈愿</p>
          <br>
          <p>愿岁月 <span class="hl2">温柔以待</span></p>
          <p>愿您永远 <span class="hl2">被爱包围</span></p>
          <p>愿每一天都 <span class="hl2">幸福安康</span></p>
          <br>
          <p class="signature">—— 爱您的孩子 ❤️</p>
        </div>
      </div>
    </div>
    <button class="tap-btn" id="tapBtn">🎁 打开礼物</button>
    <div class="share-tip" id="shareTip">
      💝 长按链接 > 发送给朋友 或 分享到朋友圈
    </div>
    <div class="info-row">
      <span>♡ 2026年5月10日</span>
      <span>♡ 母亲节</span>
    </div>
    <div class="footer">轻触屏幕任意位置 · 温馨撒花</div>
  </div>
</div>
<div class="safe-area-bottom"></div>
<script>
(function(){
var card=document.getElementById('card');
var tapBtn=document.getElementById('tapBtn');
var mainMsg=document.getElementById('mainMsg');
var giftBox=document.getElementById('giftBox');
var letter=document.getElementById('letter');
var lightBurst=document.getElementById('lightBurst');
var blessingFull=document.getElementById('blessingFull');
var blessingText=document.getElementById('blessingText');
var shareTip=document.getElementById('shareTip');
var photoInput=document.getElementById('photoInput');
var photoFrame=document.getElementById('photoFrame');
var momIcon=document.getElementById('momIcon');
var nameDisplay=document.getElementById('nameDisplay');
var nameInput=document.getElementById('nameInput');
var bName=document.getElementById('bName');
var musicBtn=document.getElementById('musicBtn');
var opened=false,musicOn=false,actx=null,musicTimeout=null;
var confettiColors=['#e91e63','#f06292','#ff4081','#f8bbd0','#d81b60','#ff80ab','#c2185b','#f48fb1'];
// Audio
function initAudio(){
  try{actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
}
function pianoNote(freq,dur,startTime){
  if(!actx)return;
  var g=actx.createGain();
  g.connect(actx.destination);
  g.gain.setValueAtTime(0,startTime);
  g.gain.linearRampToValueAtTime(0.10,startTime+0.02);
  g.gain.linearRampToValueAtTime(0.06,startTime+dur*0.2);
  g.gain.exponentialRampToValueAtTime(0.001,startTime+dur);
  var o=actx.createOscillator();
  o.type='triangle';o.frequency.value=freq;
  var o2=actx.createOscillator();
  o2.type='sine';o2.frequency.value=freq*2;
  o2.gain=new GainNode(actx);o2.gain.value=0.02;
  o2.connect(o2.gain);o2.gain.connect(actx.destination);
  o.connect(g);o.start(startTime);o.stop(startTime+dur);
  o2.start(startTime);o2.stop(startTime+dur);
}

function playMusic(){
  if(!actx)initAudio();
  if(!actx)return;
  if(actx.state==='suspended')actx.resume();
  if(musicOn){
    stopMusic();return;
  }
  musicOn=true;musicBtn.textContent='♬';musicBtn.classList.add('playing');
  var t=actx.currentTime;
  for(var i=0;i<melody.length;i++){
    pianoNote(melody[i][0],melody[i][1],t);
    t+=melody[i][1]*0.75;
  }
  var total=t-actx.currentTime;
  musicTimeout=setTimeout(function(){
    if(musicOn){musicOn=false;musicBtn.textContent='♫';musicBtn.classList.remove('playing')}
  },(total+0.5)*1000);
}
function stopMusic(){
  musicOn=false;musicBtn.textContent='♫';musicBtn.classList.remove('playing');
  if(musicTimeout)clearTimeout(musicTimeout);
  if(actx){actx.close();actx=null}
}

// Petals
var pEmojis=['🌸','🌷','🌺','💐','🌹','💕','✨'];
function petal(){
  var e=document.createElement('div');e.className='petal';
  e.textContent=pEmojis[Math.floor(Math.random()*pEmojis.length)];
  e.style.left=Math.random()*100+'%';
  e.style.fontSize=(10+Math.random()*16)+'px';
  e.style.animationDuration=(5+Math.random()*5)+'s';
  e.style.animationDelay=(Math.random()*3)+'s';
  e.style.setProperty('--pr',(200+Math.random()*400)+'deg');
  document.body.appendChild(e);
  setTimeout(function(){e.remove()},12000);
}
function showPetals(n,cont){
  n=n||20;cont=cont||false;
  for(var i=0;i<n;i++)setTimeout(petal,i*100);
  if(cont){
    var iv=setInterval(function(){if(document.hidden)return;petal()},300);
    setTimeout(function(){clearInterval(iv)},10000);
  }
}
// Confetti
function confetti(x,y){
  for(var i=0;i<30;i++){
    var e=document.createElement('div');e.className='confetti';
    var a=Math.random()*Math.PI*2,d=60+Math.random()*140;
    e.style.left=x+'px';e.style.top=y+'px';
    e.style.background=confettiColors[Math.floor(Math.random()*confettiColors.length)];
    e.style.setProperty('--cx',Math.cos(a)*d+'px');
    e.style.setProperty('--cy',Math.sin(a)*d-40+'px');
    e.style.setProperty('--cr',(Math.random()*720)+'deg');
    e.style.animationDuration=(0.6+Math.random()*0.6)+'s';
    e.style.borderRadius=Math.random()>0.5?'50%':'2px';
    document.body.appendChild(e);
    setTimeout(function(){e.remove()},1500);
  }
}
// Light burst
function burstLight(){
  lightBurst.classList.add('show');
  lightBurst.innerHTML='';
  for(var i=0;i<20;i++){
    var r=document.createElement('div');r.className='light-ray';
    r.style.setProperty('--r',(i*18)+'deg');
    r.style.animationDelay=(i*0.02)+'s';

  }

}
// Firefly
function firefly(){
  var e=document.createElement('div');e.className='firefly';
  e.style.left=Math.random()*100+'%';e.style.top=Math.random()*100+'%';
  e.style.setProperty('--dx',(Math.random()-0.5)*300+'px');
  e.style.setProperty('--dy',(Math.random()-0.5)*300+'px');
  e.style.animationDuration=(4+Math.random()*5)+'s';
  e.style.animationDelay=(Math.random()*3)+'s';
  document.body.appendChild(e);
  setTimeout(function(){e.remove()},10000);
}
// Ripple
function ripple(x,y){
  var e=document.createElement('div');e.className='ripple';
  var s=32;e.style.width=s+'px';e.style.height=s+'px';
  e.style.left=(x-s/2)+'px';e.style.top=(y-s/2)+'px';
  document.body.appendChild(e);
  setTimeout(function(){e.remove()},700);
}
// Typewriter
function typeWriter(container,speed){
  var ps=container.querySelectorAll('p');
  var lines=[];
  ps.forEach(function(p){lines.push(p.textContent);p.textContent=''});
  var idx=0,ci=0;
  blessingFull.classList.add('show');
  function nextLine(){
    if(idx>=lines.length){
      setTimeout(function(){shareTip.classList.add('show')},300);
      return;
    }
    var p=ps[idx];ci=0;
    var cursor=document.createElement('span');cursor.className='typed-cursor';
    p.appendChild(cursor);
    function typeCh(){
      if(ci<lines[idx].length){
        cursor.before(document.createTextNode(lines[idx][ci]));
        ci++;setTimeout(typeCh,speed);
      }else{
        cursor.remove();idx++;
        setTimeout(nextLine,120);
      }
    }
    typeCh();
  }
  setTimeout(nextLine,200);
}
// Open
function openCard(x,y){
  if(opened)return;
  opened=true;card.classList.add('opened');
  if(navigator.vibrate)navigator.vibrate(15);
  if(x&&y)ripple(x,y);
  mainMsg.classList.add('hidden');
  giftBox.classList.add('show');
  playMusic();
  setTimeout(function(){
    giftBox.classList.add('opened');
    burstLight();
    if(x&&y)confetti(x,y);
    showPetals(10,false);
  },400);
  setTimeout(function(){
    letter.style.transform='translate(-50%,-130%) scale(1.2)';
  },700);
  setTimeout(function(){
    letter.style.transform='translate(-50%,-160%) scale(1.3)';
    letter.style.opacity='0';
    confetti((x||window.innerWidth/2),(y||window.innerHeight/2)-30);
    showPetals(15,true);
    typeWriter(blessingText,35);
  },1200);
  setTimeout(function(){
    giftBox.style.display='none';
  },1500);
}

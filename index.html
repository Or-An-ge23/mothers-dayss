<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>母亲节快乐 💕</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 30%, #4a2060 50%, #e91e63 100%);
  background-size: 400% 400%;
  animation: gradientShift 12s ease infinite;
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  position: relative;
}
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
/* 背景光晕粒子 */
.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(40px);
  opacity: 0.4;
  animation: orbFloat 8s ease-in-out infinite;
}
.orb:nth-child(1) {
  width: 200px; height: 200px;
  background: rgba(233,30,99,0.3);
  top: 10%; left: 10%;
  animation-delay: 0s;
}
.orb:nth-child(2) {
  width: 150px; height: 150px;
  background: rgba(156,39,176,0.3);
  top: 60%; right: 15%;
  animation-delay: 2s;
}
.orb:nth-child(3) {
  width: 180px; height: 180px;
  background: rgba(255,64,129,0.25);
  bottom: 10%; left: 30%;
  animation-delay: 4s;
}
.orb:nth-child(4) {
  width: 120px; height: 120px;
  background: rgba(103,58,183,0.3);
  top: 30%; right: 30%;
  animation-delay: 6s;
}
@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -20px) scale(1.1); }
  66% { transform: translate(-20px, 15px) scale(0.9); }
}
/* 萤火虫粒子 */
.firefly {
  position: fixed;
  width: 4px; height: 4px;
  background: #fff;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  box-shadow: 0 0 6px 2px rgba(233,30,99,0.5);
  animation: fireflyMove linear infinite;
  opacity: 0;
}
@keyframes fireflyMove {
  0% { transform: translate(0, 0); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.6; }
  100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
}
/* 容器 */
.container {
  text-align: center;
  padding: 16px;
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 460px;
}
/* 卡片 */
.card {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 32px;
  padding: 36px 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.3);
  position: relative;
  overflow: hidden;
  transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.card::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle at 30% 30%, rgba(244,143,177,0.06) 0%, transparent 50%),
              radial-gradient(circle at 70% 70%, rgba(233,30,99,0.04) 0%, transparent 50%);
  animation: shimmer 10s ease-in-out infinite;
}
@keyframes shimmer {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(3%, 3%); }
}
/* 装饰花卉 */
.flower-top {
  position: absolute;
  font-size: 22px;
  opacity: 0;
  animation: floatUp 5s ease-in-out infinite;
  z-index: 1;
}
.ft1 { top: -8px; left: 8%; animation-delay: 0s; }
.ft2 { top: -8px; right: 8%; animation-delay: 1.2s; }
.ft3 { top: -8px; left: 45%; animation-delay: 2.5s; }
@keyframes floatUp {
  0% { transform: translateY(0) rotate(0deg) scale(0); opacity: 0; }
  10% { opacity: 0.6; transform: translateY(0) rotate(0deg) scale(1); }
  90% { opacity: 0.6; }
  100% { transform: translateY(-25px) rotate(15deg) scale(0.8); opacity: 0; }
}
/* 心形跳动 */
.heart-icon {
  font-size: 44px;
  display: block;
  margin-bottom: 8px;
  animation: heartBeat 1.5s ease-in-out infinite;
}
@keyframes heartBeat {
  0%, 100% { transform: scale(1); }
  14% { transform: scale(1.3); }
  28% { transform: scale(1); }
  42% { transform: scale(1.2); }
  56% { transform: scale(1); }
}
.title {
  font-size: 30px;
  font-weight: 700;
  background: linear-gradient(135deg, #c2185b, #e91e63);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
  letter-spacing: 3px;
}
.subtitle {
  font-size: 13px;
  color: #e91e63;
  opacity: 0.5;
  margin-bottom: 18px;
  letter-spacing: 2px;
}
/* 照片区域 */
.photo-area {
  margin: 14px 0;
  position: relative;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.photo-frame {
  width: 120px; height: 120px;
  border-radius: 50%;
  margin: 0 auto;
  background: linear-gradient(135deg, #fce4ec, #f8bbd0);
  border: 3px solid rgba(233,30,99,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  overflow: hidden;
  box-shadow: 0 6px 24px rgba(233,30,99,0.15);
  animation: photoGlow 3s ease-in-out infinite;
  transition: all 0.4s ease;
  position: relative;
}
@keyframes photoGlow {
  0%, 100% { box-shadow: 0 6px 24px rgba(233,30,99,0.15); }
  50% { box-shadow: 0 6px 40px rgba(233,30,99,0.3); }
}
.photo-frame img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.photo-hint {
  position: absolute;
  bottom: -18px; left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: #c2185b;
  opacity: 0.5;
  white-space: nowrap;
}
.photo-frame .mom-icon {
  font-size: 48px;
  line-height: 1;
  transition: opacity 0.3s;
}
/* 消息区域 */
.message-area {
  position: relative;
  min-height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 6px 0;
}
.main-message {
  font-size: 18px;
  line-height: 1.8;
  color: #4a2040;
  letter-spacing: 1px;
  position: relative;
  z-index: 1;
  transition: opacity 0.4s ease;
}
.main-message.hidden { display: none; }
/* 信封动画 */
.envelope-wrapper {
  position: relative;
  width: 100%;
  min-height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.envelope {
  position: relative;
  width: 200px;
  height: 140px;
  transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.envelope-body {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #f48fb1, #e91e63);
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(233,30,99,0.3);
}
.envelope-flap {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 0;
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-bottom: 70px solid #f06292;
  border-radius: 8px 8px 0 0;
  transform-origin: top;
  transition: transform 0.6s ease;
  z-index: 2;
}
.envelope.opened .envelope-flap {
  transform: rotateX(180deg);
}
.envelope-heart {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 36px;
  z-index: 1;
  animation: envHeartBeat 1.2s ease-in-out infinite;
}
.envelope.opened .envelope-heart {
  opacity: 0;
  transform: translate(-50%, -50%) scale(0);
  transition: all 0.4s ease;
}
@keyframes envHeartBeat {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.15); }
}
/* 祝福语完整 */
.blessing-full {
  display: none;
  width: 100%;
}
.blessing-full.show { display: block; }
.blessing-text {
  font-size: 17px;
  line-height: 2;
  color: #4a2040;
  letter-spacing: 1px;
}
.blessing-text .highlight {
  color: #e91e63;
  font-weight: 600;
}
.blessing-text .mom-name {
  color: #c2185b;
  font-weight: 700;
}
.signature {
  margin-top: 16px;
  font-size: 15px;
  color: #c2185b;
  letter-spacing: 2px;
  font-weight: 600;
}
/* 打字机光标 */
.typed-cursor {
  display: inline-block;
  width: 2px;
  height: 1.1em;
  background: #c2185b;
  margin-left: 2px;
  animation: blink 0.7s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink {
  50% { opacity: 0; }
}
/* 按钮 */
.tap-btn {
  display: inline-block;
  background: linear-gradient(135deg, #e91e63, #c2185b);
  color: #fff;
  border: none;
  padding: 13px 36px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 6px 20px rgba(233,30,99,0.4);
  position: relative;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  margin-top: 4px;
}
.tap-btn:active { transform: scale(0.95); }
.tap-btn::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 0; height: 0;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.5s, height 0.5s;
}
.tap-btn:active::after {
  width: 250px; height: 250px;
}
.card.opened .tap-btn { display: none; }
/* 名字编辑 */
.name-area {
  margin: 8px 0 2px;
  font-size: 14px;
  color: #c2185b;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.name-display {
  font-weight: 700;
  color: #e91e63;
  border-bottom: 1px dashed rgba(233,30,99,0.3);
  cursor: pointer;
  padding: 0 4px;
  -webkit-tap-highlight-color: transparent;
}
.name-edit-input {
  display: none;
  border: 1px solid #e91e63;
  border-radius: 12px;
  padding: 4px 12px;
  font-size: 14px;
  font-family: inherit;
  color: #c2185b;
  outline: none;
  width: 100px;
  text-align: center;
}
.name-edit-input.show { display: inline-block; }
/* 信息确认 */
.info-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-top: 14px;
  font-size: 13px;
  color: #c2185b;
  opacity: 0.6;
}
.info-row span {
  display: flex;
  align-items: center;
  gap: 3px;
}
.footer {
  margin-top: 16px;
  font-size: 12px;
  color: #c2185b;
  opacity: 0.4;
  letter-spacing: 1px;
}
/* 花瓣 */
.petal {
  position: fixed;
  font-size: 16px;
  pointer-events: none;
  z-index: 1;
  animation: petalFall linear forwards;
  opacity: 0;
}
@keyframes petalFall {
  0% { transform: translateY(-30px) rotate(0deg) scale(0.6); opacity: 0; }
  8% { opacity: 0.8; }
  92% { opacity: 0.4; }
  100% { transform: translateY(105vh) rotate(400deg) scale(1.1); opacity: 0; }
}
/* 纸屑 */
.confetti {
  position: fixed;
  width: 8px; height: 8px;
  pointer-events: none;
  z-index: 20;
  animation: confettiBurst ease-out forwards;
}
@keyframes confettiBurst {
  0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translate(var(--cx), var(--cy)) rotate(var(--cr)) scale(0); opacity: 0; }
}
/* 点击波纹 */
.ripple {
  position: fixed;
  border-radius: 50%;
  background: rgba(233,30,99,0.12);
  transform: scale(0);
  animation: rippleEffect 0.6s ease-out forwards;
  pointer-events: none;
  z-index: 10;
}
@keyframes rippleEffect {
  to { transform: scale(4); opacity: 0; }
}
/* 闪烁星星 */
.sparkle {
  position: absolute;
  width: 5px; height: 5px;
  background: #e91e63;
  border-radius: 50%;
  opacity: 0;
  animation: sparkle 2.5s ease-in-out infinite;
}
.s1 { top: 18%; left: 12%; animation-delay: 0s; }
.s2 { top: 28%; right: 18%; animation-delay: 0.8s; }
.s3 { bottom: 22%; left: 22%; animation-delay: 1.6s; }
.s4 { bottom: 18%; right: 12%; animation-delay: 2.4s; }
@keyframes sparkle {
  0%, 100% { opacity: 0; transform: scale(0); }
  50% { opacity: 0.5; transform: scale(1); }
}
/* 分享提示 */
.share-tip {
  display: none;
  margin-top: 12px;
  padding: 10px 16px;
  background: linear-gradient(135deg, #fce4ec, #f8bbd0);
  border-radius: 16px;
  font-size: 13px;
  color: #c2185b;
  letter-spacing: 1px;
  animation: fadeInUp 0.6s ease forwards;
}
.share-tip.show { display: block; }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
/* 音乐按钮 */
.music-btn {
  position: fixed;
  top: 16px; right: 16px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);
  font-size: 18px;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  color: #fff;
}
.music-btn:active { transform: scale(0.9); }
.music-btn.playing { background: rgba(255,255,255,0.35); }
.safe-area-bottom {
  height: env(safe-area-inset-bottom, 0);
}
</style>
</head>
<body>
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>
<div class="orb"></div>
<button class="music-btn" id="musicBtn">🎵</button>
<div class="container">
  <div class="card" id="card">
    <div class="flower-top ft1">🌸</div>
    <div class="flower-top ft2">🌷</div>
    <div class="flower-top ft3">🌺</div>
    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>
    <div class="sparkle s4"></div>
    <span class="heart-icon">💕</span>
    <div class="title">母亲节快乐</div>
    <div class="subtitle">Happy Mother's Day</div>
    <div class="photo-area" id="photoArea">
      <div class="photo-frame" id="photoFrame">
        <span class="mom-icon" id="momIcon">👩</span>
        <input type="file" accept="image/*" id="photoInput" style="display:none">
      </div>
      <div class="photo-hint">👆 点击更换照片</div>
    </div>
    <div class="name-area">
      致 <span class="name-display" id="nameDisplay">妈妈</span>
      <input class="name-edit-input" id="nameInput" type="text" value="妈妈" maxlength="10">
    </div>
    <div class="message-area">
      <div class="main-message" id="mainMsg">
        轻轻触碰信封<br>送上对妈妈的祝福 💌
      </div>
      <div class="envelope-wrapper" id="envWrapper" style="display:none">
        <div class="envelope" id="envelope">
          <div class="envelope-body"></div>
          <div class="envelope-flap"></div>
          <div class="envelope-heart">💖</div>
        </div>
      </div>
      <div class="blessing-full" id="blessingFull">
        <div class="blessing-text">
          <p>🌹 亲爱的 <span class="mom-name" id="blessingName">妈妈</span> 🌹</p>
          <br>
          <p>感谢您用 <span class="highlight">温柔</span> 为我撑起世界</p>
          <p>用 <span class="highlight">白发</span> 换来我的成长</p>
          <p>用 <span class="highlight">皱纹</span> 记录爱的时光</p>
          <br>
          <p>您的 <span class="highlight">笑容</span> 是阳光</p>
          <p>您的 <span class="highlight">怀抱</span> 是港湾</p>
          <p>您的 <span class="highlight">健康</span> 是我最深的祈愿</p>
          <br>
          <p>愿岁月 <span class="highlight">温柔以待</span></p>
          <p>愿您永远 <span class="highlight">被爱包围</span></p>
          <p>愿每一天都 <span class="highlight">幸福安康</span></p>
          <br>
          <div class="signature" id="signature">—— 爱您的孩子 ❤️</div>
        </div>
      </div>
    </div>
    <button class="tap-btn" id="tapBtn">💐 打开祝福</button>
    <div class="share-tip" id="shareTip">
      💝 长按上方链接，选择「发送给朋友」或「分享到朋友圈」
    </div>
    <div class="info-row">
      <span>📅 2026年5月10日</span>
      <span>💗 母亲节</span>
    </div>
    <div class="footer">* 轻触屏幕撒花 *</div>
  </div>
</div>
<div class="safe-area-bottom"></div>
<script>
(function() {
  var card = document.getElementById('card');
  var tapBtn = document.getElementById('tapBtn');
  var mainMsg = document.getElementById('mainMsg');
  var envWrapper = document.getElementById('envWrapper');
  var envelope = document.getElementById('envelope');
  var blessingFull = document.getElementById('blessingFull');
  var shareTip = document.getElementById('shareTip');
  var photoInput = document.getElementById('photoInput');
  var photoFrame = document.getElementById('photoFrame');
  var momIcon = document.getElementById('momIcon');
  var nameDisplay = document.getElementById('nameDisplay');
  var nameInput = document.getElementById('nameInput');
  var blessingName = document.getElementById('blessingName');
  var musicBtn = document.getElementById('musicBtn');
  var opened = false;
  var isPlaying = false;
  var audioCtx = null;
  var petals = ['🌸', '🌷', '🌺', '💐', '🌹', '💕', '✨', '🌻', '🌸', '🌷'];
  var confettiColors = ['#e91e63', '#c2185b', '#ff4081', '#f48fb1', '#d81b60', '#f06292', '#ec407a'];
  // 背景音乐
  function initMusic() {
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(e) {}
  }
  function playMelody() {
    if (!audioCtx) initMusic();
    if (!audioCtx) return;
    if (isPlaying) {
      audioCtx.close();
      audioCtx = null;
      isPlaying = false;
      musicBtn.textContent = '🎵';
      musicBtn.classList.remove('playing');
      return;
    }
    if (audioCtx.state === 'closed') {
      initMusic();
      if (!audioCtx) return;
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    isPlaying = true;
    musicBtn.textContent = '🎶';
    musicBtn.classList.add('playing');
    var notes = [
      523, 523, 523, 587, 659, 659,
      587, 659, 784, 659, 587, 587,
      523, 784, 784, 740, 698, 659,
      587, 698, 659, 587, 523, 523
    ];
    var durations = [0.4, 0.4, 0.4, 0.3, 0.4, 0.4, 0.3, 0.4, 0.6, 0.3, 0.3, 0.4, 0.4, 0.4, 0.3, 0.3, 0.3, 0.4, 0.3, 0.4, 0.4, 0.3, 0.4, 0.8];
    var time = 0;
    var gain = audioCtx.createGain();
    gain.gain.value = 0.12;
    gain.connect(audioCtx.destination);
    function playNote(freq, dur) {
      var osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.connect(gain);
      osc.start(audioCtx.currentTime + time);
      osc.stop(audioCtx.currentTime + time + dur * 0.9);
      time += dur;
    }
    for (var i = 0; i < notes.length; i++) {
      playNote(notes[i], durations[i]);
    }
    var total = notes.reduce(function(s, _, i) { return s + durations[i]; }, 0);
    setTimeout(function() {
      if (isPlaying) {
        isPlaying = false;
        musicBtn.textContent = '🎵';
        musicBtn.classList.remove('playing');
      }
    }, (total + 1) * 1000);
  }
  musicBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    playMelody();
  });
  musicBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    e.stopPropagation();
    playMelody();
  });
  // 照片上传
  document.getElementById('photoArea').addEventListener('click', function() {
    photoInput.click();
  });
  photoInput.addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      momIcon.style.display = 'none';
      var img = document.createElement('img');
      img.src = ev.target.result;
      img.alt = '妈妈';
      var old = photoFrame.querySelector('img');
      if (old) old.remove();
      photoFrame.appendChild(img);
    };
    reader.readAsDataURL(file);
  });
  // 名字编辑
  nameDisplay.addEventListener('click', function() {
    nameDisplay.style.display = 'none';
    nameInput.classList.add('show');
    nameInput.focus();
    nameInput.select();
  });
  nameInput.addEventListener('blur', updateName);
  nameInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { updateName(); e.preventDefault(); }
  });
  function updateName() {
    var val = nameInput.value.trim();
    if (!val) val = '妈妈';
    nameInput.value = val;
    nameDisplay.textContent = val;
    blessingName.textContent = val;
    nameDisplay.style.display = 'inline';
    nameInput.classList.remove('show');
  }
  // 花瓣
  function createPetal() {
    var el = document.createElement('div');
    el.className = 'petal';
    el.textContent = petals[Math.floor(Math.random() * petals.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.fontSize = (12 + Math.random() * 18) + 'px';
    el.style.animationDuration = (4 + Math.random() * 5) + 's';
    el.style.animationDelay = (Math.random() * 3) + 's';
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 10000);
  }
  function startPetals(count) {
    count = count || 25;
    for (var i = 0; i < count; i++) {
      setTimeout(createPetal, i * 120);
    }
    var interval = setInterval(function() {
      if (document.hidden) return;
      createPetal();
    }, 350);
    setTimeout(function() { clearInterval(interval); }, 10000);
  }
  // 纸屑爆炸
  function burstConfetti(x, y) {
    var count = 40;
    for (var i = 0; i < count; i++) {
      var el = document.createElement('div');
      el.className = 'confetti';
      var angle = Math.random() * Math.PI * 2;
      var dist = 80 + Math.random() * 160;
      var dx = Math.cos(angle) * dist;
      var dy = Math.sin(angle) * dist - 50;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      el.style.setProperty('--cx', dx + 'px');
      el.style.setProperty('--cy', dy + 'px');
      el.style.setProperty('--cr', (Math.random() * 720) + 'deg');
      el.style.animationDuration = (0.8 + Math.random() * 0.6) + 's';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 2000);
    }
  }
  // 涟漪
  function createRipple(x, y) {
    var el = document.createElement('div');
    el.className = 'ripple';
    var size = 36;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.left = (x - size / 2) + 'px';
    el.style.top = (y - size / 2) + 'px';
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 700);
  }
  // 打字机效果
  function typeWriter(element, text, speed, callback) {
    var i = 0;
    element.textContent = '';
    var cursor = document.createElement('span');
    cursor.className = 'typed-cursor';
    element.appendChild(cursor);
    function type() {
      if (i < text.length) {
        cursor.before(document.createTextNode(text.charAt(i)));
        i++;
        setTimeout(type, speed);
      } else {
        cursor.remove();
        if (callback) callback();
      }
    }
    type();
  }
  function typeBlessing() {
    var lines = [
      { el: null, text: '🌹 亲爱的 ', isName: true },
      { el: null, text: ' 🌹', delay: 200 },
      null,
      { el: null, text: '感谢您用 温柔 为我撑起世界', delay: 300 },
      { el: null, text: '用 白发 换来我的成长', delay: 300 },
      { el: null, text: '用 皱纹 记录爱的时光', delay: 300 },
      null,
      { el: null, text: '您的 笑容 是阳光', delay: 300 },
      { el: null, text: '您的 怀抱 是港湾', delay: 300 },
      { el: null, text: '您的 健康 是我最深的祈愿', delay: 300 },
      null,
      { el: null, text: '愿岁月 温柔以待', delay: 300 },
      { el: null, text: '愿您永远 被爱包围', delay: 300 },
      { el: null, text: '愿每一天都 幸福安康', delay: 300 },
      null,
      { el: null, text: '—— 爱您的孩子 ❤️', delay: 400 }
    ];
    var paragraphs = blessingFull.querySelectorAll('.blessing-text p, .blessing-text .signature');
    var idx = 0;
    function typeNext() {
      if (idx >= paragraphs.length) {
        shareTip.classList.add('show');
        return;
      }
      var p = paragraphs[idx];
      idx++;
      var text = p.textContent;
      p.textContent = '';
      var cursor = document.createElement('span');
      cursor.className = 'typed-cursor';
      p.appendChild(cursor);
      var i = 0;
      function type() {
        if (i < text.length) {
          cursor.before(document.createTextNode(text.charAt(i)));
          i++;
          setTimeout(type, 45);
        } else {
          cursor.remove();
          if (p.classList.contains('signature')) {
            shareTip.classList.add('show');
          }
          if (idx < paragraphs.length) {
            setTimeout(typeNext, 150);
          } else {
            shareTip.classList.add('show');
          }
        }
      }
      setTimeout(type, idx === 1 ? 100 : 0);
    }
    blessingFull.style.display = 'block';
    // 一次性把所有段落清空后再开始打字
    for (var i = 0; i < paragraphs.length; i++) {
      paragraphs[i].textContent = '';
    }
    setTimeout(typeNext, 200);
  }
  // 萤火虫
  function createFirefly() {
    var el = document.createElement('div');
    el.className = 'firefly';
    var x = Math.random() * 100;
    var y = Math.random() * 100;
    var dx = (Math.random() - 0.5) * 200;
    var dy = (Math.random() - 0.5) * 200;
    el.style.left = x + '%';
    el.style.top = y + '%';
    el.style.setProperty('--dx', dx + 'px');
    el.style.setProperty('--dy', dy + 'px');
    el.style.animationDuration = (3 + Math.random() * 4) + 's';
    el.style.animationDelay = (Math.random() * 5) + 's';
    document.body.appendChild(el);
    setTimeout(function() { el.remove(); }, 8000);
  }
  // 打开祝福
  function openCard(x, y) {
    if (opened) return;
    opened = true;
    card.classList.add('opened');
    if (navigator.vibrate) navigator.vibrate(15);
    if (x && y) createRipple(x, y);
    mainMsg.classList.add('hidden');
    envelope.style.display = 'block';
    envWrapper.style.display = '';
    setTimeout(function() {
      envelope.classList.add('opened');
    }, 300);
    setTimeout(function() {
      burstConfetti(x || window.innerWidth / 2, y || window.innerHeight / 2);
      startPetals(15);
      typeBlessing();
    }, 1100);
    setTimeout(function() {
      burstConfetti(
        (x || window.innerWidth / 2) + (Math.random() - 0.5) * 100,
        (y || window.innerHeight / 2) + (Math.random() - 0.5) * 100
      );
    }, 1600);
  }
  // 事件绑定
  tapBtn.addEventListener('click', function(e) {
    var rect = tapBtn.getBoundingClientRect();
    openCard(rect.left + rect.width / 2, rect.top + rect.height / 2);
  });
  tapBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    var rect = tapBtn.getBoundingClientRect();
    openCard(rect.left + rect.width / 2, rect.top + rect.height / 2);
  });
  document.addEventListener('click', function(e) {
    if (opened) return;
    if (e.target.closest('.tap-btn')) return;
    if (e.target.closest('.music-btn')) return;
    if (e.target.closest('#photoArea')) return;
    if (e.target.closest('.name-display')) return;
    openCard(e.clientX, e.clientY);
  });
  document.addEventListener('touchstart', function(e) {
    if (opened) return;
    var touch = e.touches[0];
    window._tapX = touch.clientX;
    window._tapY = touch.clientY;
  }, { passive: true });
  document.addEventListener('touchend', function(e) {
    if (opened) return;
    if (e.target.closest('.tap-btn')) return;
    if (e.target.closest('.music-btn')) return;
    if (e.target.closest('#photoArea')) return;
    if (e.target.closest('.name-display')) return;
    if (window._tapX && window._tapY) {
      openCard(window._tapX, window._tapY);
    }
  }, { passive: true });
  // 初始化：萤火虫 + 预撒花瓣
  for (var i = 0; i < 8; i++) {
    setTimeout(createFirefly, i * 400);
  }
  var fireflyInterval = setInterval(function() {
    if (document.hidden) return;
    createFirefly();
  }, 2000);
  setTimeout(function() {
    for (var i = 0; i < 4; i++) {
      setTimeout(createPetal, i * 250);
    }
  }, 600);
})();
</script>
</body>
</html>
